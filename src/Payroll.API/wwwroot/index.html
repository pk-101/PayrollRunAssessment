<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Management System</title>

    <link rel="stylesheet" href="css/site.css">
</head>
<body>

    <div class="container">

        <h1>Payroll Management System</h1>

        <section class="card">

            <h2>Run Payroll</h2>

            <div class="row">
                <select id="runMonth">
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
                <select id="runYear">
                    <option>2025</option>
                    <option selected>2026</option>
                    <option>2027</option>
                </select>
                <button id="runPayrollBtn" onclick="runPayroll()">
                    Run Payroll
                </button>
            </div>

            <div id="runResult"></div>

        </section>

        <section class="card">

            <h2>Payroll Summary</h2>

            <div class="row">
                <select id="searchMonth">
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
                <select id="searchYear">
                    <option>2025</option>
                    <option selected>2026</option>
                    <option>2027</option>
                </select>

                <button id="loadPayrollBtn"
                        onclick="loadPayroll()">
                    Load Payroll
                </button>
            </div>

            <table id="payrollTable">

                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Gross</th>
                        <th>PF</th>
                        <th>Tax</th>
                        <th>Net</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

        </section>

    </div>

    <div id="payslipModal" class="modal">

        <div class="modal-content">

            <span class="close"
                  onclick="closePayslip()">
                &times;
            </span>

            <h2>Payslip</h2>

            <div id="payslipContent"></div>


            <button onclick="printPayslip()">
                Print Payslip
            </button>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
