name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build, Test and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore PayrollRunAssessment.slnx

      - name: Build solution
        run: dotnet build PayrollRunAssessment.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/Payroll.Tests/Payroll.Tests.csproj --configuration Release --no-restore --verbosity normal

      - name: Publish API artifact
        run: |
          dotnet publish src/Payroll.API/Payroll.API.csproj --configuration Release --no-restore --output ./publish
      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish
